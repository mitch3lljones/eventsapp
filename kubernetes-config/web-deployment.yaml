apiVersion: apps/v1
kind: Deployment
metadata:
 labels:
   app: events-website
 name: events-website
spec:
 replicas: 1
 selector:
   matchLabels:
     app: events-website
     ver: v2.0
 template:
   metadata:
     labels:
       app: events-website
       ver: v2.0
   spec:
     containers:
     - image: mitch3lljones/events-website:v2.0
       name: events-api
       ports:
       - containerPort: 8080